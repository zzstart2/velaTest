<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-zh="登录 · SenseNova" data-en="Sign in · SenseNova">登录 · SenseNova</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: var(--page-bg); }

  /* 左右分栏 */
  .auth-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
  }
  .auth-hero {
    background: var(--grad-soft);
    color: var(--ink-900);
    padding: 56px 64px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  .auth-hero .brand {
    position: absolute;
    top: 40px;
    left: 64px;
    z-index: 2;
  }
  .auth-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(420px 320px at 78% 18%, rgba(124, 58, 237, 0.22) 0%, transparent 70%),
      radial-gradient(360px 320px at 12% 82%, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-hero > * { position: relative; z-index: 1; }

  .auth-hero .brand { color: var(--ink-900); font-size: 20px; }
  .auth-hero .brand-logo {
    height: 48px;
    width: auto;
  }

  /* Hero 公告胶囊：Token Plan 免费公测 */
  .hero-announce {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    padding: 12px 22px;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(124, 58, 237, 0.25);
    border-radius: 100px;
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 18px -8px rgba(124, 58, 237, 0.28);
    font-size: 17px;
    color: var(--ink-700);
    line-height: 1;
  }
  .announce-badge {
    background: var(--grad-brand);
    color: white;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    padding: 6px 12px;
    border-radius: 100px;
    box-shadow: 0 3px 10px -2px rgba(124, 58, 237, 0.5),
                inset 0 1px 0 hsla(0, 0%, 100%, 0.25);
  }
  .announce-text { display: inline-flex; align-items: center; gap: 6px; }
  .announce-text strong {
    color: var(--ink-900);
    font-weight: 700;
    font-size: 17.5px;
    letter-spacing: -0.005em;
  }
  .announce-text .grad-text {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }

  /* Hero 公告卡片（保留 class 以备它处使用） */
  .hero-cards {
    display: grid;
    gap: 14px;
    margin-top: 28px;
    max-width: 460px;
  }
  .hero-card {
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(124, 58, 237, 0.18);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    backdrop-filter: blur(10px);
    transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), border-color var(--dur) var(--ease);
  }
  .hero-card:hover {
    transform: translateY(-2px);
    border-color: rgba(124, 58, 237, 0.32);
    box-shadow: 0 12px 28px -16px rgba(124, 58, 237, 0.28);
  }
  .hero-card .card-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand-dark);
    background: rgba(124, 58, 237, 0.1);
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 8px;
  }
  .hero-card h4 {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink-900);
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .hero-card p {
    font-size: 13px;
    color: var(--ink-600);
    line-height: 1.55;
    margin: 0;
    max-width: none;
  }

  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--brand-dark);
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(124, 58, 237, 0.18);
    padding: 6px 12px;
    border-radius: 100px;
    backdrop-filter: blur(10px);
    margin-bottom: 18px;
  }
  .hero-eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--brand);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.18);
  }

  .auth-hero h1 {
    color: var(--ink-900);
    font-size: clamp(36px, 3.2vw, 46px);
    font-weight: 700;
    letter-spacing: -0.024em;
    line-height: 1.16;
    margin: 0;
  }
  .auth-hero h1 .accent {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .auth-hero h1 .released {
    font-size: 0.72em;
    color: var(--ink-700);
  }
  .auth-hero .hero-sub {
    margin: 16px 0 0;
    color: var(--ink-500);
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 460px;
  }

  .hero-content { max-width: 540px; }

  /* Release Feed */
  .release-feed {
    margin-top: 36px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(124, 58, 237, 0.14);
    border-radius: var(--radius-lg);
    padding: 18px 22px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 24px -16px rgba(124, 58, 237, 0.18);
    max-width: 480px;
  }
  .release-feed .feed-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    margin-bottom: 4px;
    border-bottom: 1px dashed rgba(15, 23, 42, 0.08);
  }
  .release-feed .feed-title {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand-dark);
  }
  .release-feed .feed-title .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--success);
    position: relative;
  }
  .release-feed .feed-title .live-dot::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    background: var(--success);
    opacity: 0.4;
    animation: feed-pulse 2s ease-in-out infinite;
  }
  @keyframes feed-pulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.6); opacity: 0; }
  }
  .release-feed .feed-meta {
    font-size: 11px;
    color: var(--ink-400);
  }

  .release-row {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 14px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(15, 23, 42, 0.05);
  }
  .release-row:last-child { border-bottom: none; padding-bottom: 4px; }
  .release-row .row-date {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-500);
    line-height: 1.4;
    padding-top: 2px;
    letter-spacing: 0.02em;
  }
  .release-row .row-date strong {
    display: block;
    color: var(--ink-900);
    font-size: 18px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 2px;
  }
  .release-row .row-body { min-width: 0; }
  .release-row .row-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--brand-dark);
    background: rgba(124, 58, 237, 0.08);
    padding: 3px 9px;
    border-radius: 100px;
    margin-bottom: 6px;
  }
  .release-row .row-tag.tag-free {
    color: var(--success);
    background: hsla(160, 70%, 40%, 0.1);
  }
  .release-row .row-title {
    font-size: 15.5px;
    font-weight: 600;
    color: var(--ink-900);
    line-height: 1.35;
    letter-spacing: -0.005em;
    margin: 0 0 4px;
  }
  .release-row .row-desc {
    font-size: 13px;
    color: var(--ink-500);
    line-height: 1.55;
    margin: 0;
  }
  .auth-hero p {
    color: var(--ink-600);
    font-size: 15.5px;
    max-width: 440px;
    margin: 0;
    line-height: 1.65;
  }

  .bonus-list { margin-top: 28px; padding: 0; max-width: 440px; }
  .bonus-list li {
    list-style: none;
    padding: 12px 0;
    color: var(--ink-700);
    font-size: 14px;
    display: flex; gap: 12px; align-items: flex-start;
    border-bottom: 1px solid rgba(15, 23, 42, 0.06);
  }
  .bonus-list li:last-child { border-bottom: none; }
  .bonus-list li .check-pill {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(124, 58, 237, 0.2);
    display: grid; place-items: center;
    flex-shrink: 0;
    color: var(--brand);
  }

  .hero-foot {
    color: var(--ink-500);
    font-size: 12.5px;
    display: flex; align-items: center; gap: 10px;
  }
  .hero-foot .lock {
    width: 26px; height: 26px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.7);
    border: 1px solid rgba(15, 23, 42, 0.06);
    display: grid; place-items: center;
    color: var(--brand-dark);
  }

  .auth-form-wrap {
    background: var(--white);
    padding: 56px 64px;
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto;
  }
  .auth-form { width: 100%; max-width: 420px; }
  .auth-form h2 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.018em;
    color: var(--ink-900);
    margin: 0 0 6px;
  }
  .auth-form .sub { color: var(--ink-500); font-size: 14px; margin-bottom: 28px; }

  /* 表单插槽：锁定高度，避免 Tab 切换跳动 */
  .form-slot {
    min-height: 268px;
    display: flex;
    flex-direction: column;
  }
  .form-slot > form { flex: 1; display: flex; flex-direction: column; }
  .form-slot > form > .btn-primary { margin-top: auto; }

  .auth-foot {
    text-align: center; margin-top: 20px;
    font-size: 14px; color: var(--ink-500);
  }
  .auth-foot a { color: var(--brand); font-weight: 500; }

  /* Tab 切换（账号密码 / 手机号）— 胶囊式 */
  .login-tabs {
    display: inline-flex;
    background: var(--ink-100);
    border-radius: 100px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 2px;
  }
  .login-tabs .t {
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-500);
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 100px;
    transition: color var(--dur) var(--ease), background var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
    user-select: none;
  }
  .login-tabs .t:hover { color: var(--ink-900); }
  .login-tabs .t.active {
    color: var(--ink-900);
    font-weight: 600;
    background: var(--white);
    box-shadow: var(--shadow-sm);
  }

  /* 输入控件统一样式 */
  .phone-input,
  .pwd-wrap,
  .sms-group .input-with-cc,
  .input-icon-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--white);
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .phone-input:focus-within,
  .pwd-wrap:focus-within,
  .sms-group .input-with-cc:focus-within,
  .input-icon-wrap:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .phone-input .cc {
    border: none;
    background: var(--ink-50);
    padding: 0 12px;
    font-size: 14px;
    color: var(--ink-700);
    border-right: 1px solid var(--ink-200);
  }
  .phone-input input,
  .pwd-wrap input,
  .sms-group .input-with-cc input {
    flex: 1;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    outline: none;
    background: transparent;
    color: var(--ink-900);
    min-width: 0;
  }
  .phone-input input::placeholder,
  .pwd-wrap input::placeholder,
  .sms-group .input-with-cc input::placeholder,
  .input-icon-wrap input::placeholder { color: var(--ink-400); }

  .pwd-wrap .field-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-400);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    transition: color var(--dur) var(--ease);
  }
  .pwd-wrap .field-icon:hover { color: var(--brand); }

  .sms-group {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .sms-btn {
    height: 42px;
    padding: 0 16px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--brand);
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    transition: all var(--dur) var(--ease);
  }
  .sms-btn:hover { background: var(--brand-soft); border-color: var(--brand); }
  .sms-btn:disabled { color: var(--ink-400); background: var(--ink-50); cursor: default; border-color: var(--ink-200); }

  .forget-link {
    display: block;
    text-align: right;
    font-size: 13px;
    color: var(--ink-500);
    margin: -4px 0 18px;
    text-decoration: none;
    cursor: pointer;
    transition: color var(--dur) var(--ease);
  }
  .forget-link:hover { color: var(--brand); }

  .auth-form .btn-primary.btn-block.btn-lg {
    height: 46px;
    font-size: 14.5px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-brand);
  }
  .auth-form .btn-primary.btn-block.btn-lg:hover {
    box-shadow: var(--shadow-brand-lg);
  }

  .login-agreement {
    margin-top: 18px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-400);
    line-height: 1.7;
  }
  .login-agreement a { color: var(--brand); text-decoration: none; }

  .input-icon-wrap .lead-ico {
    padding: 0 10px 0 14px;
    color: var(--ink-400);
    display: flex;
  }
  .input-icon-wrap input {
    flex: 1;
    border: none;
    padding: 11px 14px 11px 4px;
    font-size: 14px;
    outline: none;
    background: transparent;
    color: var(--ink-900);
    min-width: 0;
  }

  /* 多账号选择卡片 */
  .account-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin: 8px 0 4px;
  }
  .account-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    cursor: pointer;
    background: var(--white);
    transition: border-color var(--dur) var(--ease),
                background var(--dur) var(--ease),
                transform var(--dur) var(--ease),
                box-shadow var(--dur) var(--ease);
  }
  .account-card:hover {
    border-color: var(--brand-300);
    background: var(--brand-soft);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  .account-card .ava {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--grad-brand);
    color: white;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: -0.01em;
    display: grid; place-items: center;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .account-card .meta { flex: 1; min-width: 0; }
  .account-card .meta .name {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-900);
    font-family: var(--font-mono);
    letter-spacing: -0.005em;
  }
  .account-card .arrow {
    color: var(--ink-400);
    flex-shrink: 0;
    transition: transform var(--dur) var(--ease), color var(--dur) var(--ease);
  }
  .account-card:hover .arrow {
    transform: translateX(3px);
    color: var(--brand);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--ink-500);
    font-size: 13px;
    text-decoration: none;
    margin-bottom: 12px;
    cursor: pointer;
    transition: color var(--dur) var(--ease);
  }
  .back-link:hover { color: var(--brand); }

  /* 右上角语言切换 */
  .auth-utilbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }

  @media (max-width: 900px) {
    .auth-page { grid-template-columns: 1fr; }
    .auth-hero { display: none; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-hero">
    <a class="brand" href="index.html"><img src="assets/logo.svg" alt="SenseNova 日日新" class="brand-logo"/></a>

    <div class="hero-content">
      <h1 data-zh-html="SenseNova<br/><span class=&quot;accent&quot;>原生多模态智能体模型</span><br/><span class=&quot;released&quot;>已发布</span>" data-en-html="SenseNova<br/><span class=&quot;accent&quot;>native multimodal agent model</span><br/><span class=&quot;released&quot;>is here</span>">SenseNova<br/><span class="accent">原生多模态智能体模型</span><br/><span class="released">已发布</span></h1>

      <div class="hero-announce">
        <span class="announce-text" data-zh-html="<strong>Token Plan</strong> 同步开启 <span class=&quot;grad-text&quot;>免费公测</span>" data-en-html="<strong>Token Plan</strong> launches with a <span class=&quot;grad-text&quot;>free public beta</span>"><strong>Token Plan</strong> 同步开启 <span class="grad-text">免费公测</span></span>
      </div>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <div class="auth-utilbar">
        <button type="button" class="lang-toggle" onclick="toggleLang()">EN</button>
      </div>

      <h2 data-zh="登录 / 注册" data-en="Sign in / Sign up">登录 / 注册</h2>
      <p class="sub" data-zh="使用账号密码登录，或用手机号一步登录 / 注册" data-en="Sign in with account & password, or use your phone number to sign in / sign up in one step">使用账号密码登录，或用手机号一步登录 / 注册</p>

      <div class="login-tabs">
        <div class="t active" onclick="switchMode(this,'sms')" data-zh="手机号登录 / 注册" data-en="Phone (sign in or up)">手机号登录 / 注册</div>
        <div class="t" onclick="switchMode(this,'pw')" data-zh="账号密码登录" data-en="Account & password">账号密码登录</div>
      </div>

      <div class="form-slot">
      <!-- 账号密码登录：仅登录 -->
      <form id="form-pw" class="hidden" onsubmit="event.preventDefault(); location.href='console/dashboard.html';">
        <div class="form-field">
          <label data-zh="用户名" data-en="Username">用户名</label>
          <div class="input-icon-wrap">
            <span class="lead-ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.5-5 6-5s6 2 6 5"/></svg></span>
            <input type="text" placeholder="请输入用户名" data-zh-placeholder="请输入用户名" data-en-placeholder="Enter your username" required/>
          </div>
        </div>

        <div class="form-field">
          <label data-zh="密码" data-en="Password">密码</label>
          <div class="pwd-wrap">
            <input type="password" placeholder="请输入密码" data-zh-placeholder="请输入密码" data-en-placeholder="Enter your password" id="pwd-input" required/>
            <button type="button" class="field-icon" onclick="togglePwd()" aria-label="Toggle password visibility">
              <svg class="ico" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <a class="forget-link" onclick="showForgot()" data-zh="忘记密码？用手机号重置 →" data-en="Forgot password? Reset with phone →">忘记密码？用手机号重置 →</a>

        <button type="submit" class="btn btn-primary btn-block btn-lg" data-zh="登 录" data-en="Sign in">登 录</button>
      </form>

      <!-- 手机号登录 / 注册：登录注册一体入口（Step 1：手机号 + 验证码） -->
      <form id="form-sms" onsubmit="handlePhoneSubmit(event)">
        <div class="form-field">
          <label data-zh="手机号" data-en="Phone number">手机号</label>
          <div class="phone-input">
            <span class="cc" id="sms-cc" style="display:flex; align-items:center;">+86</span>
            <input id="sms-phone" type="tel" placeholder="请输入手机号" data-zh-placeholder="请输入手机号" data-en-placeholder="Enter your phone number" required/>
          </div>
        </div>

        <div class="form-field">
          <label data-zh="短信验证码" data-en="SMS code">短信验证码</label>
          <div class="sms-group">
            <div class="input-with-cc">
              <input id="sms-code" type="text" placeholder="请输入验证码" data-zh-placeholder="请输入验证码" data-en-placeholder="Enter verification code" required/>
            </div>
            <button type="button" class="sms-btn" onclick="sendSms(this)" data-zh="发送验证码" data-en="Send code">发送验证码</button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" data-zh="下一步" data-en="Continue">下一步</button>
      </form>
      </div>

      <!-- 忘记密码：用手机号重置 -->
      <div id="form-forgot" class="hidden">
        <a class="back-link" onclick="hideForgot()" data-zh="← 返回登录" data-en="← Back to sign in">← 返回登录</a>

        <h3 style="font-size:18px; margin: 0 0 6px;" data-zh="忘记密码？" data-en="Forgot password?">忘记密码？</h3>
        <p style="color: var(--ink-500); font-size: 13px; margin: 0 0 18px;" data-zh="输入账号与该账号绑定的手机号，校验通过后即可设置新密码。" data-en="Enter your account and its bound phone — verify and set a new password.">输入账号与该账号绑定的手机号，校验通过后即可设置新密码。</p>

        <form onsubmit="submitForgot(event)">
          <div class="form-field">
            <label data-zh="账号" data-en="Account">账号</label>
            <div class="input-icon-wrap">
              <span class="lead-ico"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="6" r="3"/><path d="M2 14c0-3 2.5-5 6-5s6 2 6 5"/></svg></span>
              <input id="fg-account" type="text" placeholder="请输入用户名" data-zh-placeholder="请输入用户名" data-en-placeholder="Enter your username" required/>
            </div>
          </div>

          <div class="form-field">
            <label data-zh="绑定手机号" data-en="Bound phone">绑定手机号</label>
            <div class="phone-input">
              <span class="cc" id="fg-cc" style="display:flex; align-items:center;">+86</span>
              <input id="fg-phone" type="tel" placeholder="请输入该账号绑定的手机号" data-zh-placeholder="请输入该账号绑定的手机号" data-en-placeholder="Enter the phone bound to this account" required/>
            </div>
            <div class="helper" data-zh="后端会校验账号与手机号绑定关系，不匹配将返回错误" data-en="The server verifies that the phone is bound to the account; mismatch returns an error">后端会校验账号与手机号绑定关系，不匹配将返回错误</div>
          </div>

          <div class="form-field">
            <label data-zh="短信验证码" data-en="SMS code">短信验证码</label>
            <div class="sms-group">
              <div class="input-with-cc">
                <input id="fg-code" type="text" placeholder="请输入验证码" data-zh-placeholder="请输入验证码" data-en-placeholder="Enter verification code" required/>
              </div>
              <button type="button" class="sms-btn" onclick="sendSms(this)" data-zh="发送验证码" data-en="Send code">发送验证码</button>
            </div>
          </div>

          <div class="form-field">
            <label data-zh="新密码" data-en="New password">新密码</label>
            <div class="pwd-wrap">
              <input id="fg-pwd1" type="password" placeholder="至少 8 位，含字母与数字" data-zh-placeholder="至少 8 位，含字母与数字" data-en-placeholder="At least 8 chars, letters + numbers" required/>
            </div>
          </div>

          <div class="form-field">
            <label data-zh="确认新密码" data-en="Confirm new password">确认新密码</label>
            <div class="pwd-wrap">
              <input id="fg-pwd2" type="password" placeholder="再次输入新密码" data-zh-placeholder="再次输入新密码" data-en-placeholder="Re-enter your new password" required/>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" data-zh="重置密码并登录" data-en="Reset & sign in">重置密码并登录</button>
        </form>
      </div>

      <!-- 手机号登录：Step 2 — 同号多账号选择 -->
      <div id="form-pick" class="hidden">
        <div style="font-size: 13px; color: var(--ink-500); margin: 0 0 6px;" id="pick-summary">
          <span data-zh="检测到" data-en="Found">检测到</span>
          <strong id="pick-phone-text" style="color: var(--ink-900); font-family: var(--font-mono);">+86 138****0000</strong>
          <span data-zh="下绑定 3 个账号：" data-en="bound to 3 accounts:">下绑定 3 个账号：</span>
        </div>

        <div class="account-list" id="account-list">
          <div class="account-card" onclick="pickAccount(this, 'acme-corp')">
            <div class="ava">A</div>
            <div class="meta">
              <div class="name">acme-corp</div>
            </div>
            <span class="arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3l5 5-5 5"/></svg></span>
          </div>

          <div class="account-card" onclick="pickAccount(this, 'zhangsan')">
            <div class="ava">Z</div>
            <div class="meta">
              <div class="name">zhangsan</div>
            </div>
            <span class="arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3l5 5-5 5"/></svg></span>
          </div>

          <div class="account-card" onclick="pickAccount(this, 'demo-team-2024')">
            <div class="ava">D</div>
            <div class="meta">
              <div class="name">demo-team-2024</div>
            </div>
            <span class="arrow"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 3l5 5-5 5"/></svg></span>
          </div>
        </div>
      </div>

      <p class="login-agreement" data-zh-html="登录 / 注册即代表您同意商汤大装置 <a href=&quot;https://signin.sensecore.cn/html/zh-CN/UserAgreement.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>用户协议</a> 和 <a href=&quot;https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>隐私政策</a>" data-en-html="By continuing you agree to SenseCore's <a href=&quot;https://signin.sensecore.cn/html/zh-CN/UserAgreement.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>User Agreement</a> and <a href=&quot;https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>Privacy Policy</a>">登录 / 注册即代表您同意商汤大装置 <a href="https://signin.sensecore.cn/html/zh-CN/UserAgreement.html" target="_blank" rel="noopener">用户协议</a> 和 <a href="https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html" target="_blank" rel="noopener">隐私政策</a></p>
    </div>
  </div>
</div>

<script>
function switchMode(el, mode) {
  document.querySelectorAll('.login-tabs .t').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  // 复位多账号选择 / 忘记密码视图，避免跨 Tab 残留
  const pick = document.getElementById('form-pick');
  if (pick) pick.classList.add('hidden');
  const forgot = document.getElementById('form-forgot');
  if (forgot) forgot.classList.add('hidden');
  // 显示主表单插槽
  const slot = document.querySelector('.form-slot');
  if (slot) slot.classList.remove('hidden');
  // Tab 自身可能在忘记密码态下被隐藏，这里确保可见
  document.querySelectorAll('.login-tabs').forEach(t => t.classList.remove('hidden'));
  document.getElementById('form-pw').classList.toggle('hidden', mode !== 'pw');
  document.getElementById('form-sms').classList.toggle('hidden', mode !== 'sms');
  const agreement = document.querySelector('.login-agreement');
  if (agreement) agreement.classList.remove('hidden');
}
function togglePwd() {
  const inp = document.getElementById('pwd-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}
function sendSms(btn) {
  const orig = btn.textContent;
  let s = 60;
  btn.disabled = true;
  btn.textContent = `${s}s`;
  const t = setInterval(() => {
    s--;
    btn.textContent = `${s}s`;
    if (s <= 0) { clearInterval(t); btn.disabled = false; btn.textContent = orig; }
  }, 1000);
}
function handlePhoneSubmit(e) {
  e.preventDefault();
  const cc = document.getElementById('sms-cc').value;
  const phone = document.getElementById('sms-phone').value.trim();
  // Demo 三分支：
  //   尾号 8 → 同号多账号，进入选择步骤（不可注册新账号）
  //   尾号 0 → 已注册单账号，直接登录
  //   其它  → 未注册，进入注册流程
  if (/8$/.test(phone)) {
    showAccountPicker(cc, phone);
  } else if (/0$/.test(phone)) {
    location.href = 'console/dashboard.html';
  } else {
    const q = new URLSearchParams({ cc, phone, verified: '1' }).toString();
    location.href = `register.html?${q}`;
  }
}

function showAccountPicker(cc, phone) {
  const masked = phone.length >= 4 ? (phone.slice(0, 3) + '****' + phone.slice(-4)) : phone;
  document.getElementById('pick-phone-text').textContent = `${cc} ${masked}`;
  // 隐藏主表单插槽（含 min-height），避免在多账号视图上方留出空白
  const slot = document.querySelector('.form-slot');
  if (slot) slot.classList.add('hidden');
  document.getElementById('form-sms').classList.add('hidden');
  document.getElementById('form-pick').classList.remove('hidden');
  // 多账号选择步骤下不展示底部协议
  const agreement = document.querySelector('.login-agreement');
  if (agreement) agreement.classList.add('hidden');
}

function backToPhone() {
  document.getElementById('form-pick').classList.add('hidden');
  document.getElementById('form-sms').classList.remove('hidden');
  const agreement = document.querySelector('.login-agreement');
  if (agreement) agreement.classList.remove('hidden');
}

function pickAccount(card, name) {
  document.querySelectorAll('.account-card').forEach(c => c.style.opacity = '0.5');
  card.style.opacity = '1';
  card.style.borderColor = 'var(--brand)';
  setTimeout(() => { location.href = 'console/dashboard.html'; }, 200);
}

function showForgot() {
  document.querySelectorAll('.login-tabs').forEach(el => el.classList.add('hidden'));
  const slot = document.querySelector('.form-slot');
  if (slot) slot.classList.add('hidden');
  document.getElementById('form-pw').classList.add('hidden');
  document.getElementById('form-sms').classList.add('hidden');
  document.getElementById('form-forgot').classList.remove('hidden');
  const agreement = document.querySelector('.login-agreement');
  if (agreement) agreement.classList.add('hidden');
}

function hideForgot() {
  document.getElementById('form-forgot').classList.add('hidden');
  document.querySelectorAll('.login-tabs').forEach(el => el.classList.remove('hidden'));
  const slot = document.querySelector('.form-slot');
  if (slot) slot.classList.remove('hidden');
  // 恢复到当前激活的 Tab
  const active = document.querySelector('.login-tabs .t.active');
  const mode = active && active.textContent.trim().startsWith('手机') ? 'sms'
            : active && active.textContent.trim().toLowerCase().startsWith('phone') ? 'sms'
            : 'pw';
  document.getElementById('form-pw').classList.toggle('hidden', mode !== 'pw');
  document.getElementById('form-sms').classList.toggle('hidden', mode !== 'sms');
  const agreement = document.querySelector('.login-agreement');
  if (agreement) agreement.classList.remove('hidden');
}

function submitForgot(e) {
  e.preventDefault();
  const a = document.getElementById('fg-pwd1').value;
  const b = document.getElementById('fg-pwd2').value;
  const isEn = document.documentElement.dataset.lang === 'en';
  if (a !== b) { alert(isEn ? 'Passwords do not match' : '两次输入不一致'); return; }
  alert(isEn ? 'Password has been reset. Signing you in…' : '密码重置成功，正在登录…');
  location.href = 'console/dashboard.html';
}
</script>
<script src="assets/app.js"></script>
</body>
</html>
