<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title data-zh="完善账号信息 · SenseNova" data-en="Set up account · SenseNova">完善账号信息 · SenseNova</title>
<link rel="stylesheet" href="assets/style.css"/>
<style>
  body { background: var(--page-bg); }
  .auth-page {
    min-height: 100vh;
    display: grid;
    grid-template-columns: 1.05fr 1fr;
  }
  .auth-hero {
    background: var(--grad-soft);
    color: var(--ink-900);
    padding: 56px 64px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  .auth-hero::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(420px 320px at 78% 18%, rgba(124, 58, 237, 0.22) 0%, transparent 70%),
      radial-gradient(360px 320px at 12% 82%, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
    pointer-events: none;
  }
  .auth-hero > * { position: relative; z-index: 1; }
  .auth-hero .brand {
    color: var(--ink-900);
    font-size: 20px;
    position: absolute;
    top: 40px;
    left: 64px;
    z-index: 2;
  }
  .auth-hero .brand-logo {
    height: 48px;
    width: auto;
  }

  .auth-hero h1 {
    color: var(--ink-900);
    font-size: clamp(36px, 3.2vw, 46px);
    font-weight: 700;
    letter-spacing: -0.024em;
    line-height: 1.16;
    margin: 0;
  }
  .auth-hero h1 .accent {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .auth-hero h1 .released {
    font-size: 0.72em;
    color: var(--ink-700);
  }

  .hero-content { max-width: 540px; }

  /* Hero 公告胶囊：Token Plan 免费公测 */
  .hero-announce {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-top: 28px;
    padding: 12px 22px;
    background: rgba(255, 255, 255, 0.85);
    border: 1px solid rgba(124, 58, 237, 0.25);
    border-radius: 100px;
    backdrop-filter: blur(10px);
    box-shadow: 0 6px 18px -8px rgba(124, 58, 237, 0.28);
    font-size: 17px;
    color: var(--ink-700);
    line-height: 1;
  }
  .announce-text { display: inline-flex; align-items: center; gap: 6px; }
  .announce-text strong {
    color: var(--ink-900);
    font-weight: 700;
    font-size: 17.5px;
    letter-spacing: -0.005em;
  }
  .announce-text .grad-text {
    background: var(--grad-brand);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-weight: 700;
  }

  .auth-form-wrap {
    background: var(--white);
    padding: 56px 64px;
    display: flex; align-items: center; justify-content: center;
    overflow-y: auto;
  }
  .auth-form { width: 100%; max-width: 440px; }
  .auth-form h2 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.018em;
    color: var(--ink-900);
    margin: 0 0 6px;
  }
  .auth-form .sub { color: var(--ink-500); font-size: 14px; margin-bottom: 24px; }

  .auth-foot {
    text-align: center; margin-top: 20px;
    font-size: 14px; color: var(--ink-500);
  }
  .auth-foot a { color: var(--brand); font-weight: 500; }

  /* 步骤指示 */
  .stepper {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--ink-500);
    background: var(--ink-50);
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--ink-200);
  }
  .stepper .step {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper .dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink-200);
    color: var(--ink-500);
    display: grid; place-items: center;
    font-size: 12px; font-weight: 600;
  }
  .stepper .step.done .dot {
    background: var(--success);
    color: white;
  }
  .stepper .step.active .dot {
    background: var(--brand);
    color: white;
    box-shadow: 0 0 0 4px var(--brand-soft);
  }
  .stepper .step.active .label { color: var(--ink-900); font-weight: 600; }
  .stepper .bar {
    flex: 1; height: 2px;
    background: var(--ink-200);
  }
  .stepper .bar.done { background: var(--success); }

  /* 已校验手机号横幅 */
  .verified-phone {
    background: linear-gradient(135deg, hsl(160 70% 96%) 0%, hsl(155 80% 94%) 100%);
    border: 1px solid hsl(160 60% 82%);
    color: hsl(160 70% 24%);
    padding: 14px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-bottom: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .verified-phone .left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .verified-phone .check-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--success);
    color: white;
    display: grid; place-items: center;
    flex-shrink: 0;
    box-shadow: 0 4px 10px -3px hsla(160, 70%, 40%, 0.4);
  }
  .verified-phone .num {
    font-family: var(--font-mono);
    font-weight: 600;
    color: hsl(160 70% 18%);
    letter-spacing: 0.01em;
  }
  .verified-phone .change {
    color: var(--brand);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: color var(--dur) var(--ease);
  }
  .verified-phone .change:hover { color: var(--brand-dark); text-decoration: underline; }

  .pwd-wrap {
    display: flex;
    align-items: center;
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    background: var(--white);
    transition: border-color var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
  }
  .pwd-wrap:focus-within {
    border-color: var(--brand);
    box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .pwd-wrap.invalid,
  .input.invalid { border-color: var(--danger); }
  .pwd-wrap.invalid:focus-within,
  .input.invalid:focus {
    border-color: var(--danger);
    box-shadow: 0 0 0 3px hsla(0, 84%, 60%, 0.15);
  }
  .input.invalid + .helper { color: var(--danger); }
  .pwd-wrap input {
    flex: 1;
    border: none;
    padding: 11px 14px;
    font-size: 14px;
    outline: none;
    background: transparent;
    color: var(--ink-900);
    min-width: 0;
  }
  .pwd-wrap input::placeholder { color: var(--ink-400); }
  .pwd-wrap .field-icon {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink-400);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    transition: color var(--dur) var(--ease);
  }
  .pwd-wrap .field-icon:hover { color: var(--brand); }

  /* 密码字段相对定位作为气泡锚点 */
  .pwd-field { position: relative; }

  .pwd-rules {
    list-style: none;
    margin: 0;
    padding: 12px 14px;
    display: none;
    grid-template-columns: 1fr;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--ink-200);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    right: 0;
    z-index: 10;
  }
  .pwd-rules.show { display: grid; }
  .pwd-rules::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 18px;
    width: 10px;
    height: 10px;
    background: var(--white);
    border-left: 1px solid var(--ink-200);
    border-top: 1px solid var(--ink-200);
    transform: rotate(45deg);
  }
  .pwd-rules li {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--ink-500);
    transition: color var(--dur) var(--ease);
  }
  .pwd-rules .rule-ico {
    width: 16px; height: 16px;
    flex-shrink: 0;
    background-repeat: no-repeat;
    background-position: center;
    background-size: 16px 16px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16' fill='none'><circle cx='8' cy='8' r='7' fill='%23CBD5E1'/><path d='M5.2 5.2l5.6 5.6M10.8 5.2l-5.6 5.6' stroke='white' stroke-width='1.6' stroke-linecap='round'/></svg>");
    transition: background-image var(--dur) var(--ease);
  }
  .pwd-rules li.ok { color: var(--success); }
  .pwd-rules li.ok .rule-ico {
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 16 16' fill='none'><circle cx='8' cy='8' r='7' fill='%2310B981'/><path d='M4.5 8.2L7 10.7L11.5 5.7' stroke='white' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'/></svg>");
  }

  .match-tip {
    font-size: 12px;
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .match-tip.ok { color: var(--success); }
  .match-tip.bad { color: var(--danger); }

  /* 主按钮强化 */
  .auth-form .btn-primary.btn-block.btn-lg {
    height: 46px;
    font-size: 14.5px;
    border-radius: var(--radius);
    box-shadow: var(--shadow-brand);
  }
  .auth-form .btn-primary.btn-block.btn-lg:hover {
    box-shadow: var(--shadow-brand-lg);
  }

  @media (max-width: 900px) {
    .auth-page { grid-template-columns: 1fr; }
    .auth-hero { display: none; }
    .auth-form-wrap { padding: 40px 24px; }
  }
</style>
</head>
<body>

<div class="auth-page">
  <div class="auth-hero">
    <a class="brand" href="index.html"><img src="assets/logo.svg" alt="SenseNova 日日新" class="brand-logo"/></a>

    <div class="hero-content">
      <h1 data-zh-html="SenseNova<br/><span class=&quot;accent&quot;>原生多模态智能体模型</span><br/><span class=&quot;released&quot;>已发布</span>" data-en-html="SenseNova<br/><span class=&quot;accent&quot;>native multimodal agent model</span><br/><span class=&quot;released&quot;>is here</span>">SenseNova<br/><span class="accent">原生多模态智能体模型</span><br/><span class="released">已发布</span></h1>

      <div class="hero-announce">
        <span class="announce-text" data-zh-html="<strong>Token Plan</strong> 同步开启 <span class=&quot;grad-text&quot;>免费公测</span>" data-en-html="<strong>Token Plan</strong> launches with a <span class=&quot;grad-text&quot;>free public beta</span>"><strong>Token Plan</strong> 同步开启 <span class="grad-text">免费公测</span></span>
      </div>
    </div>
  </div>

  <div class="auth-form-wrap">
    <div class="auth-form">
      <div style="display:flex; justify-content:flex-end; margin-bottom: 12px;">
        <button type="button" class="lang-toggle" onclick="toggleLang()">EN</button>
      </div>

      <h2 data-zh="完善账号信息" data-en="Set up your account">完善账号信息</h2>
      <p class="sub" data-zh="手机号已通过校验，下一步设置登录账号" data-en="Phone verified — set up your sign-in account next">手机号已通过校验，下一步设置登录账号</p>

      <div class="verified-phone">
        <div class="left">
          <span class="check-circle"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8.5l3.5 3.5L13 5"/></svg></span>
          <div>
            <div style="font-size: 11.5px; color: hsl(160 70% 30%); margin-bottom: 2px; font-weight: 500; letter-spacing: 0.02em;" data-zh="已校验手机号" data-en="Verified phone">已校验手机号</div>
            <div class="num" id="verified-num">+86 138****0000</div>
          </div>
        </div>
        <a class="change" href="login.html" data-zh="更换手机号 →" data-en="Change number →">更换手机号 →</a>
      </div>

      <form onsubmit="onSubmitRegister(event)">
        <div class="form-field">
          <label data-zh="用户名" data-en="Username">用户名</label>
          <input id="username" class="input" type="text" placeholder="请设置用户名" data-zh-placeholder="请设置用户名" data-en-placeholder="Set your username" required pattern="[a-zA-Z0-9]{6,24}"/>
          <div class="helper" data-zh="6–24 个英文、数字字符，区分大小写" data-en="6–24 letters or digits, case-sensitive">6–24 个英文、数字字符，区分大小写</div>
        </div>

        <div class="form-field pwd-field">
          <label data-zh="设置密码" data-en="Set password">设置密码</label>
          <div class="pwd-wrap">
            <input id="pwd1" type="password" placeholder="请输入密码" data-zh-placeholder="请输入密码" data-en-placeholder="Enter your password" required/>
            <button type="button" class="field-icon" onclick="togglePwd('pwd1')" aria-label="Toggle password visibility">
              <svg class="ico" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <ul class="pwd-rules" id="pwd-rules">
            <li data-rule="lower"><span class="rule-ico"></span><span data-zh="至少一个小写字母（a–z）" data-en="At least one lowercase letter (a–z)">至少一个小写字母（a–z）</span></li>
            <li data-rule="upper"><span class="rule-ico"></span><span data-zh="至少一个大写字母（A–Z）" data-en="At least one uppercase letter (A–Z)">至少一个大写字母（A–Z）</span></li>
            <li data-rule="digit"><span class="rule-ico"></span><span data-zh="至少一个数字（0–9）" data-en="At least one digit (0–9)">至少一个数字（0–9）</span></li>
            <li data-rule="special"><span class="rule-ico"></span><span data-zh="至少一个特殊字符 ~!@#$%^&amp;*?_+-.,;:" data-en="At least one special character ~!@#$%^&amp;*?_+-.,;:">至少一个特殊字符 ~!@#$%^&amp;*?_+-.,;:</span></li>
            <li data-rule="length"><span class="rule-ico"></span><span data-zh="长度 8–32 位" data-en="8–32 characters in length">长度 8–32 位</span></li>
          </ul>
        </div>

        <div class="form-field">
          <label data-zh="确认密码" data-en="Confirm password">确认密码</label>
          <div class="pwd-wrap">
            <input id="pwd2" type="password" placeholder="再次输入密码" data-zh-placeholder="再次输入密码" data-en-placeholder="Re-enter your password" required oninput="checkMatch();"/>
            <button type="button" class="field-icon" onclick="togglePwd('pwd2')" aria-label="Toggle password visibility">
              <svg class="ico" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="match-tip" id="match-tip"></div>
        </div>

        <label class="flex" style="font-size:13px; color: var(--ink-700); margin: 4px 0 20px; align-items: center; gap: 8px;">
          <input type="checkbox" required style="margin: 0; flex-shrink: 0;"/>
          <span data-zh-html="我已阅读并同意商汤大装置 <a href=&quot;https://signin.sensecore.cn/html/zh-CN/UserAgreement.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; style=&quot;color:var(--brand);&quot;>用户协议</a> 与 <a href=&quot;https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; style=&quot;color:var(--brand);&quot;>隐私政策</a>" data-en-html="I have read and agree to SenseCore's <a href=&quot;https://signin.sensecore.cn/html/zh-CN/UserAgreement.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; style=&quot;color:var(--brand);&quot;>User Agreement</a> and <a href=&quot;https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot; style=&quot;color:var(--brand);&quot;>Privacy Policy</a>">
            我已阅读并同意商汤大装置 <a href="https://signin.sensecore.cn/html/zh-CN/UserAgreement.html" target="_blank" rel="noopener" style="color:var(--brand);">用户协议</a> 与 <a href="https://signin.sensecore.cn/html/zh-CN/PrivacyPolicy.html" target="_blank" rel="noopener" style="color:var(--brand);">隐私政策</a>
          </span>
        </label>

        <button type="submit" class="btn btn-primary btn-block btn-lg" data-zh="完成注册 · 进入控制台" data-en="Finish & enter Console">完成注册 · 进入控制台</button>
      </form>

      <p class="auth-foot" data-zh-html="已有账号？<a href=&quot;login.html&quot;>返回登录</a>" data-en-html="Already have an account? <a href=&quot;login.html&quot;>Back to sign in</a>">
        已有账号？<a href="login.html">返回登录</a>
      </p>
    </div>
  </div>
</div>

<script>
// 从上一步带过来的手机号（login.html 跳转时通过 query 传入）
(function() {
  const p = new URLSearchParams(location.search);
  const cc = p.get('cc') || '+86';
  const phone = p.get('phone') || '';
  if (phone && phone.length >= 4) {
    const masked = phone.slice(0, 3) + '****' + phone.slice(-4);
    document.getElementById('verified-num').textContent = `${cc} ${masked}`;
  }
})();

function togglePwd(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

const PWD_SPECIAL = /[~!@#$%^&*?_+\-.,;:]/;

function evalPwd(v) {
  return {
    lower: /[a-z]/.test(v),
    upper: /[A-Z]/.test(v),
    digit: /\d/.test(v),
    special: PWD_SPECIAL.test(v),
    length: v.length >= 8 && v.length <= 32,
  };
}

function updatePwdRules() {
  const v = document.getElementById('pwd1').value;
  const r = evalPwd(v);
  document.querySelectorAll('#pwd-rules li').forEach(li => {
    li.classList.toggle('ok', !!r[li.dataset.rule]);
  });
}

// 气泡：失焦后，若已输入且不满足全部规则才显示；聚焦时隐藏；点击外部也关闭
(function bindPwdBubble() {
  const input = document.getElementById('pwd1');
  const rules = document.getElementById('pwd-rules');
  if (!input || !rules) return;
  const wrap = input.closest('.pwd-wrap');
  const field = input.closest('.pwd-field');

  function dismiss() {
    rules.classList.remove('show');
  }

  input.addEventListener('focus', () => {
    dismiss();
  });
  input.addEventListener('blur', () => {
    if (input.value && !isPwdValid()) {
      updatePwdRules();
      rules.classList.add('show');
      wrap.classList.add('invalid');
    } else {
      dismiss();
      wrap.classList.remove('invalid');
    }
  });
  input.addEventListener('input', () => {
    // 实时校验确认密码
    checkMatch();
    // 一旦满足全部规则就清除报错状态并收起气泡
    if (isPwdValid()) {
      wrap.classList.remove('invalid');
      dismiss();
    } else if (rules.classList.contains('show')) {
      // 气泡已显示时同步刷新规则状态
      updatePwdRules();
    }
  });

  // 点击空白处（不在 pwd-field 内）收起气泡
  document.addEventListener('mousedown', (e) => {
    if (!rules.classList.contains('show')) return;
    if (field && !field.contains(e.target)) dismiss();
  });
})();

// 用户名：失焦校验飘红
(function bindUsernameInvalid() {
  const input = document.getElementById('username');
  if (!input) return;
  const re = /^[a-zA-Z0-9]{6,24}$/;
  input.addEventListener('blur', () => {
    if (input.value && !re.test(input.value)) input.classList.add('invalid');
    else input.classList.remove('invalid');
  });
  input.addEventListener('input', () => {
    if (input.classList.contains('invalid') && re.test(input.value)) {
      input.classList.remove('invalid');
    }
  });
})();

// 确认密码：失焦校验飘红（与新密码不一致时）
(function bindConfirmPwdInvalid() {
  const pwd1 = document.getElementById('pwd1');
  const pwd2 = document.getElementById('pwd2');
  if (!pwd1 || !pwd2) return;
  const wrap = pwd2.closest('.pwd-wrap');
  pwd2.addEventListener('blur', () => {
    if (pwd2.value && pwd2.value !== pwd1.value) wrap.classList.add('invalid');
    else wrap.classList.remove('invalid');
  });
  pwd2.addEventListener('input', () => {
    if (wrap.classList.contains('invalid') && pwd2.value === pwd1.value) {
      wrap.classList.remove('invalid');
    }
  });
  // 主密码变化也可能影响一致性 — 已一致则清除红框
  pwd1.addEventListener('input', () => {
    if (wrap.classList.contains('invalid') && pwd2.value && pwd2.value === pwd1.value) {
      wrap.classList.remove('invalid');
    }
  });
})();

function isPwdValid() {
  const r = evalPwd(document.getElementById('pwd1').value);
  return r.lower && r.upper && r.digit && r.special && r.length;
}

function onSubmitRegister(e) {
  e.preventDefault();
  const isEn = document.documentElement.dataset.lang === 'en';
  if (!isPwdValid()) {
    alert(isEn ? 'Password does not meet the rules above' : '密码不满足上述规则');
    return;
  }
  const a = document.getElementById('pwd1').value;
  const b = document.getElementById('pwd2').value;
  if (a !== b) {
    alert(isEn ? 'Passwords do not match' : '两次输入不一致');
    return;
  }
  alert(isEn ? 'Account created! Welcome to SenseNova 🎉' : '账号创建成功！欢迎来到 SenseNova 🎉');
  location.href = 'console/dashboard.html';
}

function checkMatch() {
  const a = document.getElementById('pwd1').value;
  const b = document.getElementById('pwd2').value;
  const tip = document.getElementById('match-tip');
  if (!b) { tip.textContent = ''; tip.className = 'match-tip'; return; }
  if (a === b) {
    tip.textContent = document.documentElement.dataset.lang === 'en' ? '✓ Passwords match' : '✓ 两次输入一致';
    tip.className = 'match-tip ok';
  } else {
    tip.textContent = document.documentElement.dataset.lang === 'en' ? '✗ Passwords do not match' : '✗ 两次输入不一致';
    tip.className = 'match-tip bad';
  }
}
</script>
